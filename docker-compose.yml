version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: permbridge-db
    environment:
      POSTGRES_USER: permbridge_user
      POSTGRES_PASSWORD: permbridge_password
      POSTGRES_DB: permbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U permbridge_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: permbridge-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
